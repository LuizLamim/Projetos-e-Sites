<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link na Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

<style>
    :root {
    --bg-color: #0d0d0d; /* Preto profundo */
    --gold: #D4AF37;     /* Dourado sofisticado */
    --text-color: #f5f5f5;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Montserrat', sans-serif;
}

body {
    background-color: var(--bg-color);
    color: var(--text-color);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 30px 20px;
}

.container {
    width: 100%;
    max-width: 450px;
    text-align: center;
}

.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    padding: 3px;
    margin-bottom: 15px;
    object-fit: cover;
}

.name {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 5px;
    color: var(--gold);
    letter-spacing: 1px;
}

.bio {
    font-size: 0.9rem;
    margin-bottom: 35px;
    color: #a0a0a0;
    font-weight: 400;
}

.links {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 40px;
}

.link-btn {
    display: block;
    background-color: transparent;
    color: var(--text-color);
    text-decoration: none;
    padding: 16px 20px;
    border: 1px solid var(--gold);
    border-radius: 8px; /* Cantos levemente arredondados para um tom mais sério */
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
    z-index: 1;
    
    /* Estado inicial para a animação do JS */
    opacity: 0; 
    transform: translateY(20px); 
}

/* Efeito de preenchimento dourado ao passar o mouse */
.link-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 0%;
    height: 100%;
    background-color: var(--gold);
    transition: all 0.4s ease;
    z-index: -1;
}

.link-btn:hover::before {
    width: 100%;
}

.link-btn:hover {
    color: var(--bg-color); /* O texto fica preto quando o fundo fica dourado */
    font-weight: 600;
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
}

/* Classe adicionada pelo JS para exibir os botões */
.link-btn.show {
    opacity: 1;
    transform: translateY(0);
}

.social-icons {
    display: flex;
    justify-content: center;
    gap: 25px;
}

.icon {
    color: var(--text-color);
    font-size: 2.2rem;
    transition: all 0.3s ease;
}

.icon:hover {
    color: var(--gold);
    transform: translateY(-5px) scale(1.1);
    filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
}
</style>
</head>
<body>
    <div class="container">
        <header class="profile">
            <img src="https://static-public.pages.hotmart.com/uploads/media/file/10412839/logo-1080x1080.png" alt="Sua Foto" class="profile-img">
            <h1 class="name">ABAJUD</h1>
            <p class="bio">Associação Brasileira de Administradores Judiciais</p>
        </header>

        <main class="links">
            <a href="https://abajud.com/aprenda-recuperacao-judicial-gravado" target="_blank" class="link-btn">Aprenda Recuperação Judicial</a>
            <a href="https://abajud.com/administrador-judicial-ia" target="_blank" class="link-btn">Agente de I.A RJ.</a>
            <a href="https://hotmart.com/pt-br/marketplace/produtos/hagsxd-coletanea-artigos-juridicos-recuperacao-judicial-desafios-e-perspectivas-no-direito-empresarial-viz7e/H103806060H" target="_blank" class="link-btn">Livro Físico - Coletânea Artigos Jurídicos - RJ</a>
            <a href="https://abajud.com/blindagem-juridica-saude" target="_blank" class="link-btn">Blindagem Jurídica na Saúde</a>
            <a href="https://chat.whatsapp.com/Cr7jaCIQ2ds0iKMxZL7e9w" target="_blank" class="link-btn">Comunidade WhatsApp</a>
            <a href="https://forms.gle/FHoRPPP21WdDEziJ7" target="_blank" class="link-btn">Pós graduação Recuperação Judicial</a>
        </main>

        <footer class="social-icons">
            <a href="https://wa.me/5561983158636?text=Olá,%20tenho%20interesse%20no%20curso%20de%20RJ.%20Gostaria%20de%20saber%20a%20ementa%20e%20valores." target="_blank" class="icon" aria-label="WhatsApp">
                <i class="fab fa-whatsapp"></i>
            </a>
            <a href="https://www.youtube.com/@abajud_edu/shorts" target="_blank" class="icon" aria-label="YouTube">
                <i class="fab fa-youtube"></i>
            </a>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
    // Seleciona todos os botões de link
    const buttons = document.querySelectorAll('.link-btn');
    
    // Adiciona a classe 'show' a cada botão com um pequeno atraso entre eles
    buttons.forEach((btn, index) => {
        setTimeout(() => {
            btn.classList.add('show');
        }, 150 * (index + 1)); // 150ms de intervalo entre cada botão
    });
});
    </script>
</body>
</html>
