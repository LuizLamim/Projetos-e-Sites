<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Coeficiente Angular</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    
    <h3>Calculadora de Coeficiente Angular (m)</h3>
    
    <div>
        <input type="number" id="x1" placeholder="x1">
        <input type="number" id="y1" placeholder="y1">
    </div>
    <br>
    <div>
        <input type="number" id="x2" placeholder="x2">
        <input type="number" id="y2" placeholder="y2">
    </div>
    <br>
    <button id="calcular">Calcular</button>

    <h2 id="resultado">Resultado: -</h2>

    <script>
        $(document).ready(function() {
            $('#calcular').click(function() {
                // Captura os valores
                var x1 = parseFloat($('#x1').val());
                var y1 = parseFloat($('#y1').val());
                var x2 = parseFloat($('#x2').val());
                var y2 = parseFloat($('#y2').val());

                // Verifica se os valores são numéricos
                if (isNaN(x1) || isNaN(y1) || isNaN(x2) || isNaN(y2)) {
                    $('#resultado').text("Por favor, preencha todos os campos.");
                    return;
                }

                // Validação para divisão por zero (reta vertical)
                if (x2 - x1 === 0) {
                    $('#resultado').text("Resultado: Reta vertical (coeficiente indefinido).");
                } else {
                    // Cálculo do coeficiente angular
                    var m = (y2 - y1) / (x2 - x1);
                    $('#resultado').text("Resultado: m = " + m.toFixed(2));
                }
            });
        });
    </script>

</body>
</html>
