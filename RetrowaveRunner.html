<!DOCTYPE html>
<html "pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrowave Runner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0221;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        
        /* O Canvas com gradiente de pôr do sol Synthwave */
        canvas {
            background: linear-gradient(to bottom, #11001c 0%, #2a004f 60%, #ff007f 100%);
            box-shadow: 0 0 20px #0ff, 0 0 40px #ff007f;
            border: 2px solid #0ff;
            border-radius: 5px;
        }

        #game-container {
            position: relative;
        }

        #ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
            pointer-events: none;
        }

        h1 { margin: 0; font-size: 2.5rem; color: #0ff; text-transform: uppercase; letter-spacing: 2px;}
        p { margin: 10px 0; font-size: 1.2rem; color: #ff007f; text-shadow: 0 0 10px #ff007f; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <h1>Retrowave Runner</h1>
            <p id="start-msg">Aperte ESPAÇO para começar</p>
        </div>
        <!-- Resolução interna do jogo -->
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>
</body>
</html>
