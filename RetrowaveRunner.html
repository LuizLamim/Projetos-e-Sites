<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrowave Runner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0221;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        
        /* O Canvas com gradiente de pôr do sol Synthwave */
        canvas {
            background: linear-gradient(to bottom, #11001c 0%, #2a004f 60%, #ff007f 100%);
            box-shadow: 0 0 20px #0ff, 0 0 40px #ff007f;
            border: 2px solid #0ff;
            border-radius: 5px;
        }

        #game-container {
            position: relative;
        }

        #ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
            pointer-events: none;
        }

        h1 { margin: 0; font-size: 2.5rem; color: #0ff; text-transform: uppercase; letter-spacing: 2px;}
        p { margin: 10px 0; font-size: 1.2rem; color: #ff007f; text-shadow: 0 0 10px #ff007f; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <h1>Retrowave Runner</h1>
            <p id="start-msg">Aperte ESPAÇO para começar</p>
        </div>
        <!-- Resolução interna do jogo -->
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const startMsg = document.getElementById('start-msg');

        // Variáveis de Estado do Jogo
        let score = 0;
        let gameSpeed = 6;
        let isGameOver = false;
        let isStarted = false;
        let obstacles = [];
        let animationId;
        let frameCount = 0;

        // Entidade do Jogador (Bloco Neon Ciano)
        const player = {
            x: 50,
            y: 300,
            width: 30,
            height: 50,
            dy: 0,
            jumpForce: 14,
            gravity: 0.6,
            grounded: false,
            
            draw: function() {
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#0ff';
                ctx.fillStyle = '#0ff'; // Ciano
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0; // Reseta a sombra para os próximos desenhos
            },
            
            jump: function() {
                if (this.grounded) {
                    this.dy = -this.jumpForce;
                    this.grounded = false;
                }
            },
            
            update: function() {
                // Aplica a gravidade
                this.y += this.dy;
                
                // O chão fica na posição Y = 350
                if (this.y + this.height < 350) {
                    this.dy += this.gravity;
                    this.grounded = false;
                } else {
                    this.dy = 0;
                    this.grounded = true;
                    this.y = 350 - this.height;
                }
                this.draw();
            }
        };

        // Entidade dos Obstáculos (Blocos Neon Rosa)
        class Obstacle {
            constructor() {
                this.width = 20 + Math.random() * 20;
                this.height = 30 + Math.random() * 40;
                this.x = canvas.width;
                this.y = 350 - this.height;
            }
            
            draw() {
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff007f';
                ctx.fillStyle = '#ff007f'; // Rosa choque
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0;
            }
            
            update() {
                this.x -= gameSpeed;
                this.draw();
            }
        }

        // Desenha o cenário (Sol Retro e a linha de grade)
        function drawEnvironment() {
            // Sol
            ctx.beginPath();
            ctx.arc(400, 200, 90, 0, Math.PI * 2);
            ctx.fillStyle = '#ffaa00'; // Laranja
            ctx.shadowBlur = 50;
            ctx.shadowColor = '#ff5500';
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0;

            // Chão (Grid line ciano)
            ctx.beginPath();
            ctx.moveTo(0, 350);
            ctx.lineTo(800, 350);
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#0ff';
            ctx.stroke();
            ctx.closePath();
            ctx.shadowBlur = 0;
        }

        // Lógica de Spawn e Colisão
        function handleObstacles() {
            // Cria um obstáculo a cada 100 frames
            if (frameCount % 100 === 0 && isStarted) {
                obstacles.push(new Obstacle());
            }
            
            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].update();

                // Colisão AABB (Axis-Aligned Bounding Box)
                if (
                    player.x < obstacles[i].x + obstacles[i].width &&
                    player.x + player.width > obstacles[i].x &&
                    player.y < obstacles[i].y + obstacles[i].height &&
                    player.y + player.height > obstacles[i].y
                ) {
                    isGameOver = true;
                }

                // Remove o obstáculo se ele sair da tela e soma pontos
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    
                    // Aumenta a velocidade do jogo progressivamente
                    if (score % 5 === 0) gameSpeed += 0.5;
                    i--;
                }
            }
        }

        function drawScore() {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Courier New';
            ctx.fillText(`SCORE: ${score}`, 650, 40);
            
            if (isGameOver) {
                ui.style.display = 'block';
                startMsg.innerText = 'GAME OVER! Aperte ESPAÇO para reiniciar';
            }
        }

        // Loop Principal (Game Loop)
        function animate() {
            // Limpa o frame anterior
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawEnvironment();
            
            if (isStarted && !isGameOver) {
                player.update();
                handleObstacles();
                drawScore();
                frameCount++;
                animationId = requestAnimationFrame(animate);
            } else if (isGameOver) {
                // Desenha as coisas paradas
                player.draw();
                obstacles.forEach(obs => obs.draw());
                drawScore();
            } else {
                // Tela inicial parada
                player.draw();
            }
        }

        // Escutador de Teclas
        window.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault(); // Evita scroll da página
                
                if (!isStarted) {
                    // Inicia o jogo
                    isStarted = true;
                    ui.style.display = 'none';
                    animate();
                } else if (isGameOver) {
                    // Reinicia as variáveis
                    isGameOver = false;
                    score = 0;
                    gameSpeed = 6;
                    obstacles = [];
                    player.y = 300;
                    player.dy = 0;
                    frameCount = 0;
                    ui.style.display = 'none';
                    animate();
                } else {
                    // Pula
                    player.jump();
                }
            }
        });

        // Renderiza a primeira tela
        drawEnvironment();
        player.draw();
    </script>
</body>
</html>
